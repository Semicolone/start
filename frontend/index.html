<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Insight Demo</title>
    <!-- React 및 Babel CDN (빌드 없이 JSX를 실행하기 위함) -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <!-- 1. JSX 파일을 불러와서 변환합니다. -->
    <script type="text/babel">
        // 여기서 직접 실행하지 않고, frontend.jsx 로드 후에 실행되도록 합니다.
    </script>
    <script type="text/babel" src="./frontend.jsx"></script>
    <script type="text/babel">
        // frontend.jsx 안에 선언된 InsightGeneratePage 컴포넌트를 렌더링합니다.
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<InsightGeneratePage />);
    </script>

    <style>
        body { margin: 0; padding: 0; background-color: #f5f5f5; }
    </style>
</body>
</html>
