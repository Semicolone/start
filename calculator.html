<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>덧셈 계산기</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f5f7fb;
      font-family: Arial, sans-serif;
    }

    .container {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 20px;
      padding: 32px 24px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      text-align: center;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 28px;
      color: #222;
    }

    .subtitle {
      margin-bottom: 28px;
      color: #666;
      font-size: 14px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid #dcdfe6;
      border-radius: 12px;
      font-size: 16px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      background: #4a90e2;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    .result-box {
      margin-top: 22px;
      padding: 16px;
      border-radius: 12px;
      background: #f1f6ff;
      min-height: 56px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 18px;
      font-weight: bold;
      color: #1f3c68;
    }

    .error {
      margin-top: 12px;
      font-size: 14px;
      color: #d93025;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>덧셈 계산기</h1>
    <div class="subtitle">숫자 두 개를 입력하고 결과를 확인하세요</div>

    <div class="input-group">
      <input type="number" id="num1" placeholder="첫 번째 숫자" />
      <input type="number" id="num2" placeholder="두 번째 숫자" />
    </div>

    <button onclick="calculate()">계산하기</button>

    <div class="result-box" id="result">결과가 여기에 표시됩니다</div>
    <div class="error" id="error"></div>
  </div>

  <script>
    async function calculate() {
      const num1 = document.getElementById("num1").value;
      const num2 = document.getElementById("num2").value;
      const resultEl = document.getElementById("result");
      const errorEl = document.getElementById("error");

      errorEl.textContent = "";
      resultEl.textContent = "결과가 여기에 표시됩니다";

      if (num1 === "" || num2 === "") {
        errorEl.textContent = "숫자 두 개를 모두 입력해주세요.";
        return;
      }

      try {
        const response = await fetch(`/api/add?a=${num1}&b=${num2}`);
        const data = await response.json();

        if (!response.ok) {
          errorEl.textContent = data.error || "오류가 발생했습니다.";
          return;
        }

        resultEl.textContent = `결과: ${data.result}`;
      } catch (error) {
        errorEl.textContent = "서버 연결 중 오류가 발생했습니다.";
      }
    }
  </script>
</body>
</html>
